version: "3.8"

# docker-compose.test.yml — Integration test environment
# Usage: docker compose -f docker-compose.test.yml up -d
#        go test -tags=integration ./tests/integration/...
#        docker compose -f docker-compose.test.yml down -v

services:
  server:
    image: fleetml/server:latest
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "8080:8080"
      - "50051:50051"
      - "9090:9090"
    environment:
      - DATABASE_URL=postgres://fleetml:testpass@db:5432/fleetml_test?sslmode=disable
      - S3_ENDPOINT=minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=fleetml-test
      - JWT_SECRET=test-jwt-secret-not-for-production
      - COMPILER_URL=http://compiler:8081
      - NATS_URL=nats://nats:4222
      - LOG_LEVEL=debug
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      compiler:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  compiler:
    build:
      context: ./compiler
      dockerfile: Dockerfile.mock
    ports:
      - "8081:8081"
    environment:
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=fleetml-test
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/health')"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  agent-1:
    image: fleetml/agent:latest
    build:
      context: .
      dockerfile: agent/Dockerfile
    environment:
      - FLEETML_SERVER_ADDR=server:50051
      - FLEETML_DEVICE_ID=test-agent-1
      - FLEETML_ARCH=amd64
      - FLEETML_RUNTIME=onnx
      - FLEETML_RAM_MB=4096
      - FLEETML_DISK_GB=64
      - FLEETML_HARDWARE_MODEL=test-device
      - FLEETML_NATS_URL=nats://nats:4222
    depends_on:
      server:
        condition: service_healthy

  nats:
    image: nats:2.10-alpine
    command: ["--jetstream", "--store_dir", "/data"]
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 3s
      timeout: 3s
      retries: 5

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fleetml_test
      POSTGRES_USER: fleetml
      POSTGRES_PASSWORD: testpass
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleetml -d fleetml_test"]
      interval: 2s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
