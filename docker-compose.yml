version: "3.8"

services:
  server:
    image: fleetml/server:latest
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "8080:8080"    # REST API
      - "50051:50051"  # gRPC
      - "9090:9090"    # Prometheus metrics
    environment:
      - DATABASE_URL=postgres://fleetml:${DB_PASSWORD}@db:5432/fleetml?sslmode=disable
      - S3_ENDPOINT=minio:9000
      - S3_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - S3_SECRET_KEY=${MINIO_SECRET_KEY}
      - S3_BUCKET=fleetml-models
      - JWT_SECRET=${JWT_SECRET}
      - COMPILER_URL=http://compiler:8081
      - NATS_URL=nats://nats:4222
      - LOG_LEVEL=info
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      nats:
        condition: service_healthy
      compiler:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  dashboard:
    image: fleetml/dashboard:latest
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

  compiler:
    build:
      context: ./compiler
      dockerfile: Dockerfile.mock
    ports:
      - "8081:8081"
    environment:
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - S3_SECRET_KEY=${MINIO_SECRET_KEY}
      - S3_BUCKET=fleetml-models
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fleetml
      POSTGRES_USER: fleetml
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleetml"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  nats:
    image: nats:2.10-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["--jetstream", "--store_dir", "/data", "--http_port", "8222"]
    volumes:
      - natsdata:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  # Optional: Jaeger for distributed tracing
  # Uncomment to enable local trace collection and visualization
  # jaeger:
  #   image: jaegertracing/all-in-one:1.54
  #   ports:
  #     - "16686:16686"   # Jaeger UI
  #     - "4318:4318"     # OTLP HTTP receiver
  #   environment:
  #     - COLLECTOR_OTLP_ENABLED=true
  #   restart: unless-stopped
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 256M

volumes:
  pgdata:
  miniodata:
  natsdata:
