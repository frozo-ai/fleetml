name: CI
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 2 * * *" # Nightly at 2 AM UTC

jobs:
  lint-and-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Go lint
      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          working-directory: agent
      - name: Lint agent
        run: cd agent && golangci-lint run ./...
      - name: Lint server
        run: cd server && golangci-lint run ./...
      - name: Lint CLI
        run: cd cli && golangci-lint run ./...

      # Dashboard lint
      - name: Install dashboard deps
        run: cd dashboard && npm ci
      - name: Lint dashboard
        run: cd dashboard && npm run lint

      # Unit tests
      - name: Unit tests - agent
        run: cd agent && go test -race -short -coverprofile=coverage.txt ./...
      - name: Unit tests - server
        run: cd server && go test -race -short -coverprofile=coverage.txt ./...
      - name: Unit tests - CLI
        run: cd cli && go test -race -short ./...
      - name: Unit tests - simulator
        run: cd simulator && go test -race -short ./...

      # Security tests
      - name: Security tests
        run: go test -race ./tests/security/...

      # Cross-compile
      - name: Cross-compile agent
        run: |
          cd agent
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o ../bin/agent-linux-amd64 ./cmd/agent
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o ../bin/agent-linux-arm64 ./cmd/agent
      - name: Build server
        run: cd server && CGO_ENABLED=0 go build -ldflags="-s -w" -o ../bin/server ./cmd/server
      - name: Build CLI
        run: cd cli && CGO_ENABLED=0 go build -ldflags="-s -w" -o ../bin/fleetml ./cmd/fleetml
      - name: Build dashboard
        run: cd dashboard && npm run build

      # Check binary size
      - name: Check agent binary size
        run: |
          SIZE=$(stat -c%s bin/agent-linux-amd64 2>/dev/null || stat -f%z bin/agent-linux-amd64)
          echo "Agent binary size: $SIZE bytes ($(( SIZE / 1024 / 1024 ))MB)"
          if [ "$SIZE" -gt 15728640 ]; then
            echo "WARNING: Agent binary exceeds 15MB target"
          fi

  security-scan:
    runs-on: ubuntu-latest
    needs: lint-and-unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      # Go vulnerability check
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Scan agent
        run: cd agent && govulncheck ./...
      - name: Scan server
        run: cd server && govulncheck ./...
      - name: Scan CLI
        run: cd cli && govulncheck ./...

      # Container scanning
      - name: Build Docker images
        run: |
          docker build -f agent/Dockerfile -t fleetml/agent:scan .
          docker build -f server/Dockerfile -t fleetml/server:scan .
      - name: Run Trivy on agent image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: fleetml/agent:scan
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
      - name: Run Trivy on server image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: fleetml/server:scan
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      # npm audit
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: npm audit
        run: cd dashboard && npm ci && npm audit --audit-level=high || true

  integration:
    runs-on: ubuntu-latest
    needs: lint-and-unit
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Start test infrastructure
        run: docker compose -f docker-compose.test.yml up -d
      - name: Wait for services
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/health && break
            sleep 2
          done
      - name: Integration tests
        run: go test -v -tags=integration ./tests/integration/...
      - name: Fleet tests (20 devices)
        run: go test -v -tags=fleet ./tests/fleet/... -fleet-size=20
      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  nightly:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Start infrastructure
        run: docker compose -f docker-compose.test.yml up -d
      - name: Fleet at scale (500 devices)
        run: go test -v -tags=fleet ./tests/fleet/... -fleet-size=500 -timeout=30m
      - name: Chaos engineering
        run: go test -v -tags=chaos ./tests/chaos/... -timeout=60m
      - name: Benchmarks
        run: go test -v -tags=benchmark ./tests/benchmark/... -bench=. -benchmem
      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.test.yml down -v
