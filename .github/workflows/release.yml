name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build agent
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          cd agent
          go build -ldflags="-s -w -X github.com/fleetml/fleetml/agent/pkg/version.Version=${{ github.ref_name }} -X github.com/fleetml/fleetml/agent/pkg/version.GitCommit=${{ github.sha }}" \
            -o ../dist/agent-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/agent

      - name: Build CLI
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          cd cli
          go build -ldflags="-s -w -X github.com/fleetml/fleetml/cli/cmd.Version=${{ github.ref_name }} -X github.com/fleetml/fleetml/cli/cmd.GitCommit=${{ github.sha }} -X github.com/fleetml/fleetml/cli/cmd.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o ../dist/fleetml ./cmd/fleetml
          cd ../dist
          tar -czf "fleetml_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz" fleetml
          rm fleetml

      - name: Build server (linux only)
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        env:
          CGO_ENABLED: 0
        run: |
          cd server
          go build -ldflags="-s -w" -o ../dist/server-linux-amd64 ./cmd/server

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  release:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true
      - name: List release assets
        run: ls -la dist/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: |
            dist/agent-*
            dist/fleetml_*
            dist/server-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
