name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build agent
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          cd agent
          go build -ldflags="-s -w -X github.com/fleetml/fleetml/agent/pkg/version.Version=${{ github.ref_name }} -X github.com/fleetml/fleetml/agent/pkg/version.GitCommit=${{ github.sha }}" \
            -o ../dist/agent-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/agent

      - name: Build CLI
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          cd cli
          go build -ldflags="-s -w" \
            -o ../dist/fleetml-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/fleetml

      - name: Build server (linux only)
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        env:
          CGO_ENABLED: 0
        run: |
          cd server
          go build -ldflags="-s -w" -o ../dist/server-linux-amd64 ./cmd/server

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push agent
        uses: docker/build-push-action@v5
        with:
          context: .
          file: agent/Dockerfile
          push: true
          tags: |
            fleetml/agent:${{ github.ref_name }}
            fleetml/agent:latest
          platforms: linux/amd64,linux/arm64
      - name: Build and push server
        uses: docker/build-push-action@v5
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: |
            fleetml/server:${{ github.ref_name }}
            fleetml/server:latest
      - name: Build and push dashboard
        uses: docker/build-push-action@v5
        with:
          context: .
          file: dashboard/Dockerfile
          push: true
          tags: |
            fleetml/dashboard:${{ github.ref_name }}
            fleetml/dashboard:latest

  release:
    needs: [build, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: |
            dist/agent-*
            dist/fleetml-*
            dist/server-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
