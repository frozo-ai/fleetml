version: '3.8'

# FleetML Production Deployment
# Usage: docker compose -f docker-compose.prod.yml up -d
#
# Required environment variables (set in .env.prod):
#   DATABASE_URL, JWT_SECRET, DODO_API_KEY, DODO_WEBHOOK_KEY,
#   DODO_STARTER_PRODUCT_ID, DODO_PRO_PRODUCT_ID,
#   S3_ACCESS_KEY, S3_SECRET_KEY

services:
  # ── Control Plane Server ──────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - S3_ENDPOINT=${S3_ENDPOINT:-https://s3.amazonaws.com}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET:-fleetml-models}
      - S3_REGION=${S3_REGION:-us-east-1}
      - NATS_URL=nats://nats:4222
      - COMPILER_URL=http://compiler:8000
      - DODO_API_KEY=${DODO_API_KEY}
      - DODO_WEBHOOK_KEY=${DODO_WEBHOOK_KEY}
      - DODO_ENVIRONMENT=${DODO_ENVIRONMENT:-live}
      - DODO_STARTER_PRODUCT_ID=${DODO_STARTER_PRODUCT_ID}
      - DODO_PRO_PRODUCT_ID=${DODO_PRO_PRODUCT_ID}
      - BILLING_SUCCESS_URL=${BILLING_SUCCESS_URL:-https://app.fleetml.dev/dashboard/billing?success=true}
      - BILLING_DASHBOARD_URL=${BILLING_DASHBOARD_URL:-https://app.fleetml.dev/dashboard}
    depends_on:
      db:
        condition: service_healthy
      nats:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Dashboard ─────────────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.fleetml.dev}
    ports:
      - "3000:80"
    depends_on:
      - server
    restart: unless-stopped

  # ── Model Compiler ────────────────────────────────────────────────
  compiler:
    build:
      context: .
      dockerfile: compiler/Dockerfile.mock
    ports:
      - "8000:8000"
    restart: unless-stopped

  # ── PostgreSQL ────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fleetml}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-fleetml}
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fleetml}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── NATS ──────────────────────────────────────────────────────────
  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
    restart: unless-stopped

volumes:
  pgdata_prod:
