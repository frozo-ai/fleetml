version: "3.8"

# docker-compose.fleet-sim.yml — Virtual fleet simulation environment
# Usage: docker compose -f docker-compose.fleet-sim.yml up -d
#        go test -tags=fleet ./tests/fleet/... -fleet-size=20
#        docker compose -f docker-compose.fleet-sim.yml down -v
#
# This file extends the test environment with simulated agent containers
# that register as different device types to validate heterogeneous fleet
# management, variant-aware deployment, and multi-chip compilation.

services:
  server:
    image: fleetml/server:latest
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "8080:8080"
      - "50051:50051"
      - "9090:9090"
    environment:
      - DATABASE_URL=postgres://fleetml:testpass@db:5432/fleetml_fleet?sslmode=disable
      - S3_ENDPOINT=minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=fleetml-fleet
      - JWT_SECRET=fleet-sim-jwt-secret
      - COMPILER_URL=http://compiler:8081
      - NATS_URL=nats://nats:4222
      - LOG_LEVEL=info
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      compiler:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  compiler:
    build:
      context: ./compiler
      dockerfile: Dockerfile.mock
    environment:
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=fleetml-fleet
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/health')"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  # Simulated Jetson Nano agents (TensorRT runtime)
  agent-jetson:
    image: fleetml/agent:latest
    build:
      context: .
      dockerfile: agent/Dockerfile
    environment:
      - FLEETML_SERVER_ADDR=server:50051
      - FLEETML_DEVICE_ID=jetson-${HOSTNAME:-001}
      - FLEETML_ARCH=arm64
      - FLEETML_GPU_TYPE=nvidia-jetson
      - FLEETML_RUNTIME=tensorrt
      - FLEETML_RAM_MB=4096
      - FLEETML_DISK_GB=64
      - FLEETML_HARDWARE_MODEL=jetson-nano
      - FLEETML_NATS_URL=nats://nats:4222
    depends_on:
      server:
        condition: service_healthy
    deploy:
      replicas: 5

  # Simulated Raspberry Pi agents (TFLite runtime)
  agent-rpi:
    image: fleetml/agent:latest
    build:
      context: .
      dockerfile: agent/Dockerfile
    environment:
      - FLEETML_SERVER_ADDR=server:50051
      - FLEETML_DEVICE_ID=rpi-${HOSTNAME:-001}
      - FLEETML_ARCH=arm64
      - FLEETML_GPU_TYPE=none
      - FLEETML_RUNTIME=tflite
      - FLEETML_RAM_MB=2048
      - FLEETML_DISK_GB=32
      - FLEETML_HARDWARE_MODEL=rpi-4b
      - FLEETML_NATS_URL=nats://nats:4222
    depends_on:
      server:
        condition: service_healthy
    deploy:
      replicas: 5

  # Simulated Intel NUC agents (OpenVINO runtime)
  agent-intel:
    image: fleetml/agent:latest
    build:
      context: .
      dockerfile: agent/Dockerfile
    environment:
      - FLEETML_SERVER_ADDR=server:50051
      - FLEETML_DEVICE_ID=intel-${HOSTNAME:-001}
      - FLEETML_ARCH=amd64
      - FLEETML_GPU_TYPE=intel-uhd
      - FLEETML_RUNTIME=openvino
      - FLEETML_RAM_MB=8192
      - FLEETML_DISK_GB=128
      - FLEETML_HARDWARE_MODEL=nuc-11
      - FLEETML_NATS_URL=nats://nats:4222
    depends_on:
      server:
        condition: service_healthy
    deploy:
      replicas: 5

  # Simulated ONNX-only agents (generic/testing)
  agent-onnx:
    image: fleetml/agent:latest
    build:
      context: .
      dockerfile: agent/Dockerfile
    environment:
      - FLEETML_SERVER_ADDR=server:50051
      - FLEETML_DEVICE_ID=onnx-${HOSTNAME:-001}
      - FLEETML_ARCH=amd64
      - FLEETML_GPU_TYPE=none
      - FLEETML_RUNTIME=onnx
      - FLEETML_RAM_MB=4096
      - FLEETML_DISK_GB=64
      - FLEETML_HARDWARE_MODEL=generic-x86
      - FLEETML_NATS_URL=nats://nats:4222
    depends_on:
      server:
        condition: service_healthy
    deploy:
      replicas: 5

  nats:
    image: nats:2.10-alpine
    command: ["--jetstream", "--store_dir", "/data"]
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 3s
      timeout: 3s
      retries: 5

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fleetml_fleet
      POSTGRES_USER: fleetml
      POSTGRES_PASSWORD: testpass
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleetml -d fleetml_fleet"]
      interval: 2s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
