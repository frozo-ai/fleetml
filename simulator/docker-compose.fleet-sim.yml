version: "3.8"

# Virtual Fleet Simulator
# Usage: docker compose -f docker-compose.yml -f simulator/docker-compose.fleet-sim.yml up --scale agent=20

services:
  # Infrastructure (from root docker-compose)
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fleetml
      POSTGRES_USER: fleetml
      POSTGRES_PASSWORD: ${DB_PASSWORD:-fleetml_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata_sim:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleetml"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"

  # Control plane server
  server:
    build:
      context: ..
      dockerfile: server/Dockerfile
    environment:
      DATABASE_URL: postgres://fleetml:${DB_PASSWORD:-fleetml_dev}@db:5432/fleetml?sslmode=disable
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      S3_BUCKET: fleetml-models
      JWT_SECRET: ${JWT_SECRET:-sim-dev-secret}
    ports:
      - "8080:8080"
      - "50051:50051"
    depends_on:
      db:
        condition: service_healthy

  # Virtual agents (scale with --scale agent=N)
  agent:
    build:
      context: ..
      dockerfile: simulator/Dockerfile.virtual-device
    environment:
      FLEETML_SERVER: server:50051
      FLEETML_MODE: virtual
      HEARTBEAT_INTERVAL: 10s
    depends_on:
      - server
    deploy:
      replicas: 5

volumes:
  pgdata_sim:
