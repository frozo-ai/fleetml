      "@type": "SoftwareApplication",

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Can't I just use AWS Greengrass?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Greengrass locks you into AWS, isn't ML-focused, and requires deep AWS expertise. FleetML is chip-neutral, ML-first, and works with any infrastructure."
          }
        },
        {
          "@type": "Question",
          "name": "Can I build edge ML deployment with SSH scripts?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Custom scripts work for 5 devices. At 50+, you need canary rollouts, rollback, offline handling, and multi-chip compilation. That's 6-12 weeks of engineering FleetML gives you on day one."
          }
        },
        {
          "@type": "Question",
          "name": "What about Balena or Mender for edge ML?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Great for OS and container updates. But they don't understand ML models — no model-aware canary, no inference metrics, no hot-swap, no ONNX compilation."
          }
        },
        {
          "@type": "Question",
          "name": "Does MLflow handle edge ML deployment?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "MLflow stops at the cloud boundary. It packages your model but doesn't deploy it to physical edge hardware, handle offline operation, or manage device fleets."
          }
        }
      ]
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "HowTo",
      "name": "How to deploy an ML model to edge devices with FleetML",
      "description": "Deploy your first ML model to an edge device in under 5 minutes using FleetML's CLI, then scale to your entire fleet.",
      "totalTime": "PT5M",
      "step": [
        {
          "@type": "HowToStep",
          "position": 1,
          "name": "Install the FleetML CLI",
          "text": "Install the FleetML command-line tool by running: curl -sSL https://get.fleetml.io | sh"
        },
        {
          "@type": "HowToStep",
          "position": 2,
          "name": "Deploy your first model",
          "text": "Deploy an ONNX model to a local device by running: fleetml deploy model.onnx --device local"
        },
        {
          "@type": "HowToStep",
          "position": 3,
          "name": "Scale to your fleet",
          "text": "Deploy the same model to your entire production fleet by running: fleetml deploy model.onnx --fleet production"
        }
      ]
    }
